name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: pytest

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean BrushWatermark.spec

      - name: Resolve version and tag
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "from brush_watermark import __version__; print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BrushWatermark ${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated release from commit ${{ github.sha }}.

            **Usage:** `BrushWatermark.exe path\to\image.jpg`
          files: dist/BrushWatermark.exe
          generate_release_notes: true
